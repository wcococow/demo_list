apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: task-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1  # workers can briefly dip — jobs stay in queue
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: localhost:5000/task-api:latest   # same image as api
          imagePullPolicy: Always
          command: ["celery", "-A", "celery_app", "worker",
                    "--loglevel=info", "--concurrency=4"]
          envFrom:
            - secretRef:
                name: task-api-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
