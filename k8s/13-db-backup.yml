apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: task-api
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: task-api
spec:
  schedule: "0 2 * * *"    # 2am every day
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              envFrom:
                - secretRef:
                    name: task-api-secrets
              command:
                - sh
                - -c
                - |
                  FILENAME="/backups/backup-$(date +%Y%m%d-%H%M%S).sql.gz"
                  pg_dump "$DATABASE_URL" | gzip > "$FILENAME"
                  echo "Backup written to $FILENAME"
                  # Keep only last 7 backups
                  ls -t /backups/*.sql.gz | tail -n +8 | xargs -r rm
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: backup-pvc
